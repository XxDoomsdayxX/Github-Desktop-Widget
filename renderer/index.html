<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitPulse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="widget">

  <!-- Always-visible compact bar -->
  <div class="bar" id="bar">
    <div class="bar-left" id="barLeft">
      <div class="status-dot idle" id="barDot" role="img" aria-label="Idle"></div>
      <span class="bar-label" id="barLabel">GitPulse</span>
    </div>
    <div class="bar-right">
      <button class="icon-btn chevron-btn" id="chevronBtn" aria-label="Toggle details" aria-hidden="true">
        <svg width="10" height="6" viewBox="0 0 10 6" fill="none" aria-hidden="true">
          <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="drag-grip" aria-hidden="true">
        <svg width="6" height="10" viewBox="0 0 6 10" fill="currentColor" aria-hidden="true">
          <circle cx="1.5" cy="1.5" r="1"/><circle cx="4.5" cy="1.5" r="1"/>
          <circle cx="1.5" cy="5" r="1"/><circle cx="4.5" cy="5" r="1"/>
          <circle cx="1.5" cy="8.5" r="1"/><circle cx="4.5" cy="8.5" r="1"/>
        </svg>
      </span>
      <button class="icon-btn" id="closeBtn" aria-label="Hide to tray" title="Hide to tray">
        <svg width="9" height="9" viewBox="0 0 9 9" fill="none" aria-hidden="true">
          <path d="M1 1L8 8M8 1L1 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Expandable detail panel -->
  <div class="panel" id="panel" hidden>

    <!-- Repo selector -->
    <div class="panel-section">
      <div class="dropdown" id="dropdown">
        <button class="dropdown-trigger" id="dropdownTrigger"
          aria-haspopup="listbox" aria-expanded="false" aria-label="Select repository">
          <span class="dropdown-label" id="dropdownLabel">Select a repository</span>
          <svg class="chevron" width="9" height="6" viewBox="0 0 9 6" fill="none" aria-hidden="true">
            <path d="M1 1L4.5 5L8 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="dropdown-menu" id="dropdownMenu" role="listbox" aria-label="Repositories" hidden></div>
      </div>
    </div>

    <div class="panel-divider"></div>

    <!-- Commit detail -->
    <div class="panel-commit" id="panelCommit" role="status" aria-live="polite">
      <span class="commit-prompt">Select a repository above</span>
    </div>

    <div class="panel-divider"></div>

    <!-- Actions -->
    <div class="panel-actions">
      <button class="btn-pull" id="pullBtn" disabled>Pull</button>
      <button class="icon-btn action-icon" id="refreshBtn" aria-label="Refresh" title="Refresh">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
          <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
        </svg>
      </button>
      <button class="icon-btn action-icon" id="settingsBtn" aria-label="Settings" title="Settings">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.892 3.433-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.892-1.64-.901-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.474l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115l.094-.319z"/>
          <path d="M8 5.754a2.246 2.246 0 1 0 0 4.492 2.246 2.246 0 0 0 0-4.492z"/>
        </svg>
      </button>
    </div>

    <!-- Settings inline panel -->
    <div class="settings-panel" id="settingsPanel" hidden aria-hidden="true">
      <div class="panel-divider"></div>
      <div class="settings-inner">

        <div class="settings-group">
          <label class="settings-label" for="tokenInput">GitHub Token</label>
          <input
            type="password"
            id="tokenInput"
            class="text-input"
            placeholder="ghp_xxxxxxxxxxxx"
            autocomplete="off"
            spellcheck="false"
          >
          <div class="settings-row-actions">
            <button class="btn-connect" id="connectBtn">Connect</button>
            <button class="btn-disconnect" id="disconnectBtn" hidden>Disconnect</button>
          </div>
          <p class="settings-hint">
            <button class="hint-link" id="tokenDocsBtn">Create token</button>
            &nbsp;&middot;&nbsp;<code>repo</code> scope
          </p>
        </div>

        <div class="settings-group">
          <label class="settings-label" for="refreshSelect">Auto-refresh</label>
          <select id="refreshSelect" class="select-input">
            <option value="1">Every minute</option>
            <option value="5" selected>Every 5 min</option>
            <option value="10">Every 10 min</option>
            <option value="30">Every 30 min</option>
          </select>
        </div>

      </div>
    </div>

    <div class="panel-end"></div>

  </div>
</div>
<script src="app.js"></script>
</body>
</html>
